openapi: "3.0.3"
info:
  title: Example API
  version: "1.0.0"
  description: An example API to demonstrate overlays.
servers:
  - url: https://api.example.com/v1
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      responses:
        "200":
          description: A list of items
  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: An item
    delete:
      operationId: deleteItem
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
