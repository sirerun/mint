version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - paramTypeCombine
        - httpNoBody
        - emptyStringTest
        - builtinShadow
        - unnamedResult
        - redundantSprint
  exclusions:
    rules:
      # Exclude staticcheck style suggestions (QF prefix) — these are non-critical
      - linters:
          - staticcheck
        text: "^QF"
      # In test files, ignore unchecked errors — tests fail fast without them
      - path: "_test\\.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
