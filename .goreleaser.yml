version: 2

builds:
  - main: ./cmd/mint
    binary: mint
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "mint_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: sirerun
      name: homebrew-tap
    homepage: "https://github.com/sirerun/mint"
    description: "Generate MCP servers from OpenAPI specs"
    license: "Apache-2.0"
    install: |
      bin.install "mint"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
